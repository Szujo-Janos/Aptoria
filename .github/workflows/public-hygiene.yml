name: Public repository hygiene

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no private runtime files are committed
        shell: bash
        run: |
          set -euo pipefail
          forbidden=(
            ".env"
            "vendor"
            "node_modules"
            "database/database.sqlite"
            "storage/app/installed.lock"
            "storage/app/setup-token.txt"
            "storage/app/aptoria-license.json"
            "storage/app/license-public.pem"
            "storage/app/license-private.pem"
            "storage/app/license-authority-public.pem"
            "storage/app/license-authority-private.pem"
            "storage/app/license-runtime-lease.json"
            "public/storage"
          )
          for path in "${forbidden[@]}"; do
            if [ -e "$path" ]; then
              echo "Forbidden runtime/private path present: $path"
              exit 1
            fi
          done

      - name: Verify no private key material is committed
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn --exclude-dir=.git "BEGIN .*PRIVATE KEY" .; then
            echo "Private key material must not be committed."
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: PHP syntax check
        shell: bash
        run: |
          set -euo pipefail
          find app config database routes resources -name "*.php" -print0 | xargs -0 -n1 php -l
